name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - task/gha-1-composite-action

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
      - run: npm run lint:shell
